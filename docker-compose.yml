# Deploy the Laravel Chronicle Documentation behind an existing
# Traefik reverse proxy. Traefik terminates TLS; this container
# serves plain HTTP

services:
  docs:
    image: ghcr.io/laravel-chronicle/docs:latest
    container_name: docs
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://127.0.0.1:80/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - traefik

networks:
  traefik:
    external: true
